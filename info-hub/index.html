const timeAgo = (d) => {
  if (!d) return "";
  const diff = Date.now() - new Date(d).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return "たった今";
  if (mins < 60) return `${mins}分前`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}時間前`;
  const days = Math.floor(hrs / 24);
  if (days < 30) return `${days}日前`;
  return new Date(d).toLocaleDateString("ja-JP", { month: "numeric", day: "numeric" });
};

const fmtDate = (d) => {
  if (!d) return "";
  return new Date(d).toLocaleDateString("ja-JP", { year: "numeric", month: "2-digit", day: "2-digit" });
};

const stripHtml = (html) => {
  if (!html) return "";
  return html.replace(/<[^>]+>/g, "").replace(/&nbsp;/g, " ").replace(/&amp;/g, "&").replace(/&lt;/g, "<").replace(/&gt;/g, ">").replace(/&quot;/g, '"').trim();
};

  const found_pref = PREFECTURES.find(p => text.includes(p));
  // 場所抽出（都道府県＋具体地名）

  return {
    species: [...new Set(found_species)],
    methods: [...new Set(found_methods)],
    prefecture: found_pref || "",
    location: locMatch ? locMatch[1] : (found_pref || ""),
  };
};

/* ═══ モーダル ═══ */
.modal-bg {

// ════════════════════════════════════════════════════════════
//   コンポーネント: Stat Card
// ════════════════════════════════════════════════════════════
const StatCard = ({ icon, num, label, variant = "default" }) => (
  <div className={`stat-card ${variant}`}>
    <div className="stat-icon">{icon}</div>
    <div className="stat-num">{num}</div>
    <div className="stat-label">{label}</div>
  </div>
);

// ════════════════════════════════════════════════════════════
//   コンポーネント: Rank List
// ════════════════════════════════════════════════════════════
const RankList = ({ icon, title, items, max = 5 }) => {
  const top = items.slice(0, max);
  const maxVal = top[0]?.count || 1;
  return (
    <div className="rank-list">
      <div className="rank-h">
        <span className="rank-h-icon">{icon}</span>
        <span className="rank-h-text">{title}</span>
      </div>
      {top.length === 0 && <div style={{ fontSize: 11, color: 'var(--gray-2)', padding: '8px 0' }}>データがありません</div>}
      {top.map((item, i) => (
        <div className="rank-row" key={i}>
          <div className="rank-num">#{i + 1}</div>
          <div className="rank-name">{item.name}</div>
          <div className="rank-bar-wrap"><div className="rank-bar" style={{ width: `${(item.count / maxVal) * 100}%` }} /></div>
          <div className="rank-cnt">{item.count}</div>
        </div>
      ))}
    </div>
  );
};

// ════════════════════════════════════════════════════════════
//   コンポーネント: Report Card (構造化データ表示)
// ════════════════════════════════════════════════════════════
const ReportCard = ({ report, onToggleFav, isFav, onClick }) => {
  const sourceClass = `rc-source-${report.sourceType}`;
  const hasStructured = report.aiProcessed || report.species?.length > 0 || report.location;

  return (
    <div
      className={`report-card ${report.aiProcessed ? 'ai-extracted' : ''} ${isFav ? 'fav' : ''}`}
      onClick={() => onClick(report)}
    >
      {report.thumbnail
        ? <img src={report.thumbnail} className="rc-thumb" alt="" onError={e => { e.target.outerHTML = '<div class="rc-thumb-ph">🐟</div>'; }} />
        : <div className="rc-thumb-ph">🐟</div>}
      <div className="rc-body">
        <div className="rc-source-row">
          <span className={`rc-source-badge ${sourceClass}`}>{report.sourceName}</span>
          <span className="rc-date-meta">{timeAgo(report.publishedAt)}</span>
        </div>
        <div className="rc-title">{report.title}</div>
        {hasStructured && (
          <div className="rc-data">
            <div className="rc-data-label">📅 日付:</div>
            <div className={`rc-data-val ${!report.date ? 'empty' : ''}`}>{report.date ? fmtDate(report.date) : '不明'}</div>

            <div className="rc-data-label">📍 場所:</div>
            <div className={`rc-data-val ${!report.location ? 'empty' : ''}`}>
              {report.location || '不明'}{report.prefecture && report.prefecture !== report.location ? ` (${report.prefecture})` : ''}
            </div>

            <div className="rc-data-label">🐟 魚種:</div>
            <div className="rc-data-val">
              {report.species?.length ? (
                <div className="rc-tags">{report.species.map((s, i) => <span key={i} className="rc-tag rc-tag-fish">{s}</span>)}</div>
              ) : <span className="empty">未抽出</span>}
            </div>

            <div className="rc-data-label">🎣 釣り方:</div>
            <div className="rc-data-val">
              {report.methods?.length ? (
                <div className="rc-tags">{report.methods.map((m, i) => <span key={i} className="rc-tag rc-tag-method">{m}</span>)}</div>
              ) : <span className="empty">未抽出</span>}
            </div>
          </div>
        )}
        <div className="rc-comment">{report.comment || stripHtml(report.description).slice(0, 120)}</div>
      </div>
      <div className="rc-actions" onClick={e => e.stopPropagation()}>
        <button className={`rc-act-btn ${isFav ? 'fav-on' : ''}`} onClick={() => onToggleFav(report.id)} title={isFav ? "お気に入り解除" : "お気に入り"}>
          {isFav ? '⭐' : '☆'} {isFav ? '保存済' : '保存'}
        </button>
        <a href={report.link} target="_blank" rel="noopener noreferrer" className="rc-act-link" onClick={e => e.stopPropagation()}>記事を開く →</a>
      </div>
    </div>
  );
};

// ════════════════════════════════════════════════════════════
//   コンポーネント: Modal Detail
// ════════════════════════════════════════════════════════════
const ReportDetailModal = ({ report, onClose, onToggleFav, isFav, onAiExtract, aiKey }) => {
  const [extracting, setExtracting] = useState(false);
  if (!report) return null;
  const handleAiExtract = async () => {
    if (!aiKey) { alert("Anthropic APIキーを設定してください"); return; }
    setExtracting(true);
    try { await onAiExtract(report); } finally { setExtracting(false); }
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-h">
          <span className="modal-t">📋 釣果レポート詳細</span>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-b">
          {report.thumbnail && <img src={report.thumbnail} alt="" style={{ width: '100%', borderRadius: 8, marginBottom: 12 }} onError={e => e.target.style.display = 'none'} />}
          <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginBottom: 10 }}>
            <span className={`rc-source-badge rc-source-${report.sourceType}`}>{report.sourceName}</span>
            <span style={{ fontSize: 11, color: 'var(--gray-2)' }}>{fmtDate(report.publishedAt)} ({timeAgo(report.publishedAt)})</span>
          </div>
          <h3 style={{ fontSize: 16, marginBottom: 12, color: 'var(--white)' }}>{report.title}</h3>

          <div className="rc-data" style={{ marginBottom: 14 }}>
            <div className="rc-data-label">📅 釣行日:</div>
            <div className={`rc-data-val ${!report.date ? 'empty' : ''}`}>{report.date ? fmtDate(report.date) : '未抽出'}</div>
            <div className="rc-data-label">📍 場所:</div>
            <div className={`rc-data-val ${!report.location ? 'empty' : ''}`}>{report.location || '未抽出'}</div>
            <div className="rc-data-label">🗾 都道府県:</div>
            <div className={`rc-data-val ${!report.prefecture ? 'empty' : ''}`}>{report.prefecture || '未抽出'}</div>
            <div className="rc-data-label">🐟 魚種:</div>
            <div className="rc-data-val">{report.species?.length ? <div className="rc-tags">{report.species.map((s, i) => <span key={i} className="rc-tag rc-tag-fish">{s}</span>)}</div> : <span className="empty">未抽出</span>}</div>
            <div className="rc-data-label">🎣 釣り方:</div>
            <div className="rc-data-val">{report.methods?.length ? <div className="rc-tags">{report.methods.map((m, i) => <span key={i} className="rc-tag rc-tag-method">{m}</span>)}</div> : <span className="empty">未抽出</span>}</div>
          </div>

          <div style={{ fontSize: 12, color: 'var(--gray-1)', lineHeight: 1.7, marginBottom: 16, padding: 12, background: 'rgba(0,0,0,0.2)', borderRadius: 7 }}>
            <strong style={{ color: 'var(--sky)' }}>📝 内容/コメント:</strong><br/>
            {report.comment || stripHtml(report.description) || '（内容なし）'}
          </div>

          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            <button className="btn btn-gold" onClick={() => onToggleFav(report.id)}>{isFav ? '⭐ お気に入り解除' : '☆ お気に入り'}</button>
            {!report.aiProcessed && (
              <button className="btn btn-primary" onClick={handleAiExtract} disabled={extracting}>
                {extracting ? '🔄 AI解析中...' : '✨ AIで詳細抽出'}
              </button>
            )}
            <a href={report.link} target="_blank" rel="noopener noreferrer" className="btn" style={{ textDecoration: 'none', textAlign: 'center' }}>📰 元記事を開く</a>
          </div>
        </div>
      </div>
    </div>
  );
};

// ════════════════════════════════════════════════════════════
//   FETCH: RSS取得 + 並列処理
// ════════════════════════════════════════════════════════════
const fetchRss = async (feed) => {
  try {
    const res = await fetch(`${RSS2JSON}${encodeURIComponent(feed.url)}&count=10`);
    const data = await res.json();
    if (data.status !== "ok") throw new Error(data.message || "RSS取得失敗");
    return (data.items || []).map((item, idx) => {
      const description = stripHtml(item.description || item.content || "");
      const heur = heuristicExtract(item.title, description);
      return {
        id: `${feed.id}-${item.guid || item.link || idx}`,
        title: item.title,
        link: item.link,
        description: description,
        thumbnail: item.thumbnail || item.enclosure?.link || "",
        publishedAt: item.pubDate,
        // 構造化データ初期値（ヒューリスティック抽出）
        date: item.pubDate ? new Date(item.pubDate).toISOString() : null,
        location: heur.location,
        prefecture: heur.prefecture,
        species: heur.species,
        methods: heur.methods,
        comment: description.slice(0, 200),
        aiProcessed: false,
        // メタ
        sourceName: feed.name,
        sourceType: feed.type,
        sourceId: feed.id,
        feedRegion: feed.region,
      };
    });
  } catch (e) {
    return { error: e.message, feedId: feed.id };
  }
};

// ════════════════════════════════════════════════════════════
//   AI抽出: Claude API で構造化データを抽出
// ════════════════════════════════════════════════════════════
const aiExtractReport = async (report, apiKey) => {
  const prompt = `以下の釣り記事から構造化データをJSON形式で抽出してください。

タイトル: ${report.title}
内容: ${report.description}

以下のJSON形式のみで出力（マークダウン記号やコメント不要）:
{
  "date": "YYYY-MM-DD形式の釣行日（記事内に明記がある場合のみ、なければnull）",
  "location": "具体的な釣り場（例: 鹿島港、〇〇堤防、〇〇川河口）",
  "prefecture": "都道府県名（例: 茨城県、東京都）",
  "species": ["釣れた魚種の配列、例: メバル、カサゴ"],
  "methods": ["使用した釣り方の配列、例: ジグヘッド、ワーム、サビキ"],
  "comment": "記事の核心を120字以内で要約"
}`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 600,
      messages: [{ role: "user", content: prompt }],
    }),
  });
  if (!res.ok) throw new Error(`API ${res.status}: ${await res.text()}`);
  const data = await res.json();
  const text = data.content?.[0]?.text || "";
  const json = text.replace(/```json|```/g, "").trim();
  return JSON.parse(json);
};

// ════════════════════════════════════════════════════════════
//   TAB: ダッシュボード
// ════════════════════════════════════════════════════════════
function DashboardTab({ reports, onJumpToReports }) {
  const stats = useMemo(() => {
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const todayCnt = reports.filter(r => new Date(r.publishedAt) >= today).length;
    const week = new Date(today); week.setDate(week.getDate() - 7);
    const weekCnt = reports.filter(r => new Date(r.publishedAt) >= week).length;
    const aiCnt = reports.filter(r => r.aiProcessed).length;

    // 魚種ランキング
    const sp = {};
    reports.forEach(r => (r.species || []).forEach(s => { sp[s] = (sp[s] || 0) + 1; }));
    const topSp = Object.entries(sp).map(([name, count]) => ({ name, count })).sort((a, b) => b.count - a.count);

    // 場所ランキング
    const loc = {};
    reports.forEach(r => { if (r.prefecture) loc[r.prefecture] = (loc[r.prefecture] || 0) + 1; });
    const topLoc = Object.entries(loc).map(([name, count]) => ({ name, count })).sort((a, b) => b.count - a.count);

    // 釣具店ランキング
    const sh = {};
    reports.forEach(r => { sh[r.sourceName] = (sh[r.sourceName] || 0) + 1; });
    const topSh = Object.entries(sh).map(([name, count]) => ({ name, count })).sort((a, b) => b.count - a.count);

    return { todayCnt, weekCnt, aiCnt, total: reports.length, topSp, topLoc, topSh };
  }, [reports]);

  return (
    <div>
      <div className="sec-h">
        <div><span className="sec-t">📊 釣果ダッシュボード</span><span className="sec-t-sub">全データ統計</span></div>
        <button className="btn btn-primary" onClick={onJumpToReports}>📋 全レポート一覧 →</button>
      </div>

      <div className="dash-grid">
        <StatCard icon="🎣" num={stats.total} label="総レポート数" />
        <StatCard icon="📅" num={stats.todayCnt} label="本日の新着" variant="gold" />
        <StatCard icon="📆" num={stats.weekCnt} label="今週の新着" variant="mint" />
        <StatCard icon="✨" num={stats.aiCnt} label="AI解析済" variant="coral" />
      </div>

      <div style={{ display: 'grid', gap: 14, gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))' }}>
        <RankList icon="🐟" title="魚種ランキング" items={stats.topSp} />
        <RankList icon="📍" title="エリアランキング" items={stats.topLoc} />
        <RankList icon="🏪" title="情報ソースランキング" items={stats.topSh} />
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//   TAB: 釣果レポート (メイン機能)
// ════════════════════════════════════════════════════════════
function ReportsTab({ feeds, setFeeds, reports, setReports, favorites, setFavorites, aiKey, setAiKey, onUpdateReport }) {
  const [loading, setLoading] = useState(false);
  const [errors, setErrors] = useState({});
  const [showManage, setShowManage] = useState(false);
  const [showApiSetup, setShowApiSetup] = useState(false);
  const [search, setSearch] = useState("");
  const [filterSpecies, setFilterSpecies] = useState("");
  const [filterPref, setFilterPref] = useState("");
  const [filterShop, setFilterShop] = useState("");
  const [filterPeriod, setFilterPeriod] = useState("all");
  const [sort, setSort] = useState("newest");
  const [detail, setDetail] = useState(null);
  const [aiBatch, setAiBatch] = useState({ running: false, done: 0, total: 0 });

  // フィード管理用
  const [newName, setNewName] = useState(""); const [newUrl, setNewUrl] = useState(""); const [newType, setNewType] = useState("shop");
  // APIキー入力用
  const [apiKeyInput, setApiKeyInput] = useState("");

  const activeFeeds = feeds.filter(f => f.active);

  // 全フィード並列取得
  const reloadAll = useCallback(async () => {
    if (activeFeeds.length === 0) return;
    setLoading(true); setErrors({});
    const results = await Promise.all(activeFeeds.map(f => fetchRss(f)));
    const all = []; const errs = {};
    results.forEach((r, i) => {
      if (Array.isArray(r)) all.push(...r);
      else if (r?.error) errs[r.feedId] = r.error;
    });
    // マージ: 既存のAI解析済データを保持
    setReports(prev => {
      const prevMap = new Map(prev.map(r => [r.id, r]));
      const merged = all.map(n => {
        const old = prevMap.get(n.id);
        return old?.aiProcessed ? { ...n, ...old } : n;
      });
      // 重複排除（URLベース）
      const seen = new Set();
      const dedup = merged.filter(r => {
        if (seen.has(r.link)) return false;
        seen.add(r.link); return true;
      });
      return dedup;
    });
    setErrors(errs); setLoading(false);
  }, [activeFeeds, setReports]);

  useEffect(() => {
    if (reports.length === 0) reloadAll();
  }, []);

  // フィルタリング
  const filtered = useMemo(() => {
    let out = reports;
    if (search) {
      const q = search.toLowerCase();
      out = out.filter(r => 
        r.title?.toLowerCase().includes(q) ||
        r.description?.toLowerCase().includes(q) ||
        r.location?.includes(search) ||
        r.species?.some(s => s.includes(search))
      );
    }
    if (filterSpecies) out = out.filter(r => r.species?.includes(filterSpecies));
    if (filterPref) out = out.filter(r => r.prefecture === filterPref);
    if (filterShop) out = out.filter(r => r.sourceId === filterShop);
    if (filterPeriod !== "all") {
      const now = Date.now(); const days = { "1d": 1, "7d": 7, "30d": 30 }[filterPeriod];
      const limit = now - days * 86400000;
      out = out.filter(r => new Date(r.publishedAt).getTime() >= limit);
    }
    out = [...out];
    if (sort === "newest") out.sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));
    if (sort === "oldest") out.sort((a, b) => new Date(a.publishedAt) - new Date(b.publishedAt));
    if (sort === "species") out.sort((a, b) => (b.species?.length || 0) - (a.species?.length || 0));
    return out;
  }, [reports, search, filterSpecies, filterPref, filterShop, filterPeriod, sort]);

  // 利用可能な選択肢
  const availSpecies = useMemo(() => [...new Set(reports.flatMap(r => r.species || []))].sort(), [reports]);
  const availPrefs = useMemo(() => [...new Set(reports.map(r => r.prefecture).filter(Boolean))].sort(), [reports]);

  const toggleFav = (id) => {
    setFavorites(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  };

  const handleAiExtract = async (report) => {
    if (!aiKey) { setShowApiSetup(true); return; }
    try {
      const ext = await aiExtractReport(report, aiKey);
      const updated = {
        ...report,
        date: ext.date || report.date,
        location: ext.location || report.location,
        prefecture: ext.prefecture || report.prefecture,
        species: ext.species?.length ? ext.species : report.species,
        methods: ext.methods?.length ? ext.methods : report.methods,
        comment: ext.comment || report.comment,
        aiProcessed: true,
      };
      onUpdateReport(updated);
      if (detail?.id === report.id) setDetail(updated);
    } catch (e) { alert(`AI抽出失敗: ${e.message}`); }
  };

  const handleBatchAi = async () => {
    if (!aiKey) { setShowApiSetup(true); return; }
    const todo = filtered.filter(r => !r.aiProcessed).slice(0, 10);
    if (todo.length === 0) { alert("AI解析対象がありません"); return; }
    setAiBatch({ running: true, done: 0, total: todo.length });
    for (let i = 0; i < todo.length; i++) {
      try {
        const ext = await aiExtractReport(todo[i], aiKey);
        onUpdateReport({
          ...todo[i],
          date: ext.date || todo[i].date,
          location: ext.location || todo[i].location,
          prefecture: ext.prefecture || todo[i].prefecture,
          species: ext.species?.length ? ext.species : todo[i].species,
          methods: ext.methods?.length ? ext.methods : todo[i].methods,
          comment: ext.comment || todo[i].comment,
          aiProcessed: true,
        });
      } catch (e) { console.warn(e); }
      setAiBatch(b => ({ ...b, done: b.done + 1 }));
    }
    setAiBatch({ running: false, done: 0, total: 0 });
  };

  const clearFilters = () => { setSearch(""); setFilterSpecies(""); setFilterPref(""); setFilterShop(""); setFilterPeriod("all"); };
  const hasFilters = search || filterSpecies || filterPref || filterShop || filterPeriod !== "all";

  // ===== 管理画面 =====
  if (showManage) {
    const toggle = (id) => setFeeds(feeds.map(f => f.id === id ? { ...f, active: !f.active } : f));
    const del = (id) => setFeeds(feeds.filter(f => f.id !== id));
    const add = () => {
      if (!newName.trim() || !newUrl.trim()) return;
      setFeeds([...feeds, { id: `c${Date.now()}`, name: newName, url: newUrl, type: newType, region: "", active: true }]);
      setNewName(""); setNewUrl("");
    };
    return (
      <div>
        <div className="sec-h">
          <span className="sec-t">⚙ フィード管理</span>
          <button className="btn" onClick={() => setShowManage(false)}>← 戻る</button>
        </div>
        <div className="manage-grid">
          {feeds.map(f => (
            <div className="m-card" key={f.id}>
              <button className={`m-tog ${f.active ? 'on' : 'off'}`} onClick={() => toggle(f.id)} aria-label="切替" />
              <div className="m-info">
                <div className="m-info-name">{f.type === 'shop' ? '🏪' : '📰'} {f.name}</div>
                <div className="m-info-url">{f.url}</div>
              </div>
              <div className="m-meta">
                <span className={`m-meta-tag ${f.type === 'shop' ? 'rc-source-shop' : 'rc-source-media'}`}>{f.type === 'shop' ? '釣具店' : 'メディア'}</span>
                {f.region && <span style={{ fontSize: 9, color: 'var(--gray-2)' }}>{f.region}</span>}
              </div>
              <button className="btn btn-danger" onClick={() => del(f.id)}>削除</button>
            </div>
          ))}
        </div>
        <div className="add-form">
          <div className="add-form-h">＋ カスタムRSSフィードを追加</div>
          <div className="add-form-row">
            <input className="f-inp f" placeholder="サイト名" value={newName} onChange={e => setNewName(e.target.value)} />
            <input className="f-inp f" placeholder="RSS URL (https://...)" value={newUrl} onChange={e => setNewUrl(e.target.value)} />
            <select className="f-inp" value={newType} onChange={e => setNewType(e.target.value)}>
              <option value="shop">釣具店</option><option value="media">メディア</option>
            </select>
            <button className="btn btn-primary" onClick={add}>追加</button>
          </div>
        </div>
      </div>
    );
  }

  // ===== APIキー設定画面 =====
  if (showApiSetup) {
    return (
      <div>
        <div className="sec-h">
          <span className="sec-t">🔑 Anthropic APIキー設定</span>
          <button className="btn" onClick={() => setShowApiSetup(false)}>← 戻る</button>
        </div>
        <div className="api-key-box">
          <div className="api-key-h">✨ AI構造化抽出機能の有効化</div>
          <div className="api-key-help">
            記事から<strong>日付・場所・魚種・釣り方</strong>を自動抽出するためにClaude APIキーが必要です。<br/>
            1. <a href="https://console.anthropic.com/" target="_blank" rel="noopener noreferrer">console.anthropic.com</a> でアカウント作成<br/>
            2. API Keys → Create Keyでキーを生成<br/>
            3. 下記に貼り付けて保存（ブラウザに保存されます）<br/>
            ※ 1記事の解析コスト約0.001ドル（10記事=約0.01ドル）
          </div>
          <div className="api-key-row">
            <input type="password" className="api-key-input" placeholder="sk-ant-api03-..." value={apiKeyInput} onChange={e => setApiKeyInput(e.target.value)} />
            <button className="btn btn-gold" onClick={() => { setAiKey(apiKeyInput); setShowApiSetup(false); }} disabled={!apiKeyInput.trim()}>保存</button>
          </div>
          {aiKey && <div style={{ fontSize: 11, color: 'var(--mint)', marginTop: 12 }}>✓ APIキー設定済み</div>}
        </div>
      </div>
    );
  }

  // ===== メイン画面 =====
  return (
    <div>
      <div className="sec-h">
        <div>
          <span className="sec-t">📋 釣果レポート</span>
          <span className="sec-t-sub">{filtered.length}件 / 全{reports.length}件</span>
        </div>
        <div className="sec-act-row">
          <button className="btn" onClick={() => setShowApiSetup(true)}>{aiKey ? '🔑 設定済' : '🔑 APIキー'}</button>
          <button className="btn" onClick={() => setShowManage(true)}>⚙ 管理</button>
          <button className="btn" onClick={reloadAll} disabled={loading}>{loading ? '...' : '↻ 更新'}</button>
          <button className="btn btn-primary" onClick={handleBatchAi} disabled={aiBatch.running || !aiKey}>{aiBatch.running ? `AI解析 ${aiBatch.done}/${aiBatch.total}` : '✨ AI一括解析(10件)'}</button>
        </div>
      </div>

      {!aiKey && (
        <div className="ai-extract-bar">
          <span className="ai-extract-icon">💡</span>
          <div className="ai-extract-info">
            <div className="ai-extract-t">AI解析でデータ価値を最大化</div>
            <div className="ai-extract-d">Anthropic APIキーを設定すると、記事から自動で日付・場所・魚種・釣り方を抽出できます</div>
          </div>
          <button className="btn btn-gold" onClick={() => setShowApiSetup(true)}>設定する →</button>
        </div>
      )}

      {aiBatch.running && (
        <div className="ai-extract-bar">
          <span className="ai-extract-icon">🔄</span>
          <div className="ai-extract-info" style={{ width: '100%' }}>
            <div className="ai-extract-t">AI解析実行中... {aiBatch.done} / {aiBatch.total}</div>
            <div className="ai-extract-progress"><div className="ai-extract-progress-bar" style={{ width: `${(aiBatch.done / aiBatch.total) * 100}%` }} /></div>
          </div>
        </div>
      )}

      {/* フィルタバー */}
      <div className="filter-bar">
        <input className="filter-search" placeholder="🔍 タイトル・場所・魚種で検索..." value={search} onChange={e => setSearch(e.target.value)} />
        <select className="filter-sel" value={filterSpecies} onChange={e => setFilterSpecies(e.target.value)}>
          <option value="">魚種(全て)</option>{availSpecies.map(s => <option key={s} value={s}>{s}</option>)}
        </select>
        <select className="filter-sel" value={filterPref} onChange={e => setFilterPref(e.target.value)}>
          <option value="">都道府県(全て)</option>{availPrefs.map(p => <option key={p} value={p}>{p}</option>)}
        </select>
        <select className="filter-sel" value={filterShop} onChange={e => setFilterShop(e.target.value)}>
          <option value="">ソース(全て)</option>{feeds.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
        </select>
        <select className="filter-sel" value={filterPeriod} onChange={e => setFilterPeriod(e.target.value)}>
          <option value="all">期間(全て)</option><option value="1d">本日</option><option value="7d">1週間</option><option value="30d">1ヶ月</option>
        </select>
        <select className="filter-sel" value={sort} onChange={e => setSort(e.target.value)}>
          <option value="newest">新着順</option><option value="oldest">古い順</option><option value="species">魚種多い順</option>
        </select>
        {hasFilters && <button className="filter-clear" onClick={clearFilters}>× フィルタクリア</button>}
      </div>

      {/* エラー表示 */}
      {Object.keys(errors).length > 0 && (
        <div style={{ background: 'rgba(255,107,91,0.08)', border: '1px solid rgba(255,107,91,0.3)', borderRadius: 8, padding: 10, marginBottom: 12, fontSize: 11, color: 'var(--coral)' }}>
          ⚠ 一部フィードの取得に失敗: {Object.entries(errors).map(([id, msg]) => `${feeds.find(f => f.id === id)?.name || id}`).join('、')} (管理画面で無効化可能)
        </div>
      )}

      {/* レポート一覧 */}
      {loading && reports.length === 0 && <div className="loading"><div className="spinner" /><span>{activeFeeds.length}件のフィードを並列取得中...</span></div>}
      {!loading && filtered.length === 0 && (
        <div className="empty">
          <div className="empty-i">🎣</div>
          <div className="empty-t">レポートが見つかりません</div>
          <div className="empty-d">{hasFilters ? "フィルタを変更してみてください" : "フィードを更新するか、管理画面でフィードを追加してください"}</div>
        </div>
      )}
      <div className="reports-grid">
        {filtered.map(r => (
          <ReportCard
            key={r.id}
            report={r}
            isFav={favorites.includes(r.id)}
            onToggleFav={toggleFav}
            onClick={setDetail}
          />
        ))}
      </div>

      {detail && (
        <ReportDetailModal
          report={detail}
          onClose={() => setDetail(null)}
          onToggleFav={toggleFav}
          isFav={favorites.includes(detail.id)}
          onAiExtract={handleAiExtract}
          aiKey={aiKey}
        />
      )}
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//   TAB: YouTube
// ════════════════════════════════════════════════════════════
function YouTubeTab({ channels, setChannels, ytKey, setYtKey }) {
  const [videos, setVideos] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [showManage, setShowManage] = useState(false);
  const [keyInput, setKeyInput] = useState("");
  const [newName, setNewName] = useState(""); const [newId, setNewId] = useState(""); const [newIcon, setNewIcon] = useState("🎣");

  const active = channels.filter(c => c.active && c.channelId);

  const fetchVids = useCallback(async () => {
    if (!ytKey || active.length === 0) return;
    setLoading(true); setError(""); const all = [];
    for (const ch of active) {
      try {
        const r = await fetch(`https://www.googleapis.com/youtube/v3/search?key=${ytKey}&channelId=${ch.channelId}&part=snippet&order=date&maxResults=4&type=video`);
        const d = await r.json();
        if (d.error) throw new Error(d.error.message);
        if (d.items) all.push(...d.items.map(v => ({ ...v, channelName: ch.name, channelIcon: ch.icon })));
      } catch (e) { console.warn(`${ch.name}: ${e.message}`); }
    }
    all.sort((a, b) => new Date(b.snippet.publishedAt) - new Date(a.snippet.publishedAt));
    setVideos(all); setLoading(false);
  }, [ytKey, active]);

  useEffect(() => { if (ytKey) fetchVids(); }, [channels, ytKey]);

  if (showManage) {
    const toggle = (id) => setChannels(channels.map(c => c.id === id ? { ...c, active: !c.active } : c));
    const del = (id) => setChannels(channels.filter(c => c.id !== id));
    const add = () => {
      if (!newName || !newId) return;
      setChannels([...channels, { id: `c${Date.now()}`, name: newName, channelId: newId, icon: newIcon, active: true, note: "" }]);
      setNewName(""); setNewId("");
    };
    return (
      <div>
        <div className="sec-h">
          <span className="sec-t">⚙ チャンネル管理</span>
          <button className="btn" onClick={() => setShowManage(false)}>← 戻る</button>
        </div>
        <div className="manage-grid">
          {channels.map(c => (
            <div className="m-card" key={c.id}>
              <button className={`m-tog ${c.active ? 'on' : 'off'}`} onClick={() => toggle(c.id)} />
              <div className="m-info">
                <div className="m-info-name">{c.icon} {c.name}</div>
                <div className="m-info-url">{c.channelId || '⚠ チャンネルID未設定'}</div>
                {c.note && <div className="m-info-note">{c.note}</div>}
              </div>
              <button className="btn btn-danger" onClick={() => del(c.id)}>削除</button>
            </div>
          ))}
        </div>
        <div className="add-form">
          <div className="add-form-h">＋ チャンネルを追加</div>
          <div className="add-form-row">
            <input className="f-inp" style={{ width: 50, textAlign: 'center' }} value={newIcon} onChange={e => setNewIcon(e.target.value)} placeholder="🎣" />
            <input className="f-inp f" placeholder="チャンネル名" value={newName} onChange={e => setNewName(e.target.value)} />
            <input className="f-inp f" placeholder="チャンネルID (UC...)" value={newId} onChange={e => setNewId(e.target.value)} />
            <button className="btn btn-primary" onClick={add}>追加</button>
          </div>
          <div style={{ fontSize: 10, color: 'var(--gray-2)', marginTop: 10, lineHeight: 1.7 }}>
            💡 <strong>チャンネルIDの取得方法</strong>:<br/>
            ① YouTubeでチャンネルページを開く<br/>
            ② URLが<code style={{ color: 'var(--sky)' }}>youtube.com/channel/UCxxxxxxxx</code>形式ならその<code style={{ color: 'var(--sky)' }}>UC...</code>がID<br/>
            ③ <code>@ユーザー名</code>形式の場合は <a href="https://commentpicker.com/youtube-channel-id.php" target="_blank" rel="noopener noreferrer" style={{ color: 'var(--sky)' }}>commentpicker.com/youtube-channel-id.php</a> で変換可能
          </div>
        </div>
      </div>
    );
  }

  if (!ytKey) {
    return (
      <div>
        <div className="sec-h"><span className="sec-t">🎬 YouTube 最新動画</span></div>
        <div className="api-key-box">
          <div className="api-key-h">🔑 YouTube Data API v3 キー設定</div>
          <div className="api-key-help">
            <strong>無料取得手順:</strong><br/>
            1. <a href="https://console.cloud.google.com/" target="_blank" rel="noopener noreferrer">console.cloud.google.com</a> にアクセス<br/>
            2. プロジェクト作成 → 「YouTube Data API v3」を有効化<br/>
            3. 認証情報 → APIキーを作成<br/>
            ※ 無料枠1日10,000ユニット
          </div>
          <div className="api-key-row">
            <input type="password" className="api-key-input" placeholder="AIza..." value={keyInput} onChange={e => setKeyInput(e.target.value)} />
            <button className="btn btn-gold" onClick={() => { setYtKey(keyInput); }} disabled={!keyInput.trim()}>保存</button>
          </div>
        </div>
        <div style={{ textAlign: 'center', padding: 20, fontSize: 11, color: 'var(--gray-1)', lineHeight: 1.8 }}>
          設定後に取得するチャンネル: <br/>
          <span style={{ color: 'var(--sky)' }}>{active.map(c => `${c.icon} ${c.name}`).join('・')}</span>
        </div>
      </div>
    );
  }

  return (
    <div>
      <div className="sec-h">
        <div><span className="sec-t">🎬 YouTube 最新動画</span><span className="sec-t-sub">{videos.length}件</span></div>
        <div className="sec-act-row">
          <button className="btn" onClick={() => setShowManage(true)}>⚙ チャンネル</button>
          <button className="btn" onClick={fetchVids} disabled={loading}>{loading ? '...' : '↻ 更新'}</button>
        </div>
      </div>
      {loading && <div className="loading"><div className="spinner" /><span>YouTube取得中...</span></div>}
      {error && <div style={{ color: 'var(--coral)', fontSize: 12, marginBottom: 12 }}>⚠ {error}</div>}
      {!loading && videos.length === 0 && (
        <div className="empty"><div className="empty-i">📺</div><div className="empty-t">動画がありません</div><div className="empty-d">チャンネルIDが正しいか管理画面で確認してください</div></div>
      )}
      <div className="yt-grid">
        {videos.map((v, i) => (
          <a key={i} href={`https://www.youtube.com/watch?v=${v.id.videoId}`} target="_blank" rel="noopener noreferrer" className="yt-card">
            <div className="yt-thumb">
              <img src={v.snippet.thumbnails?.medium?.url || v.snippet.thumbnails?.default?.url} alt={v.snippet.title} />
              <div className="yt-overlay"><div className="yt-play"><svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z" /></svg></div></div>
            </div>
            <div className="yt-info">
              <div className="yt-ch-row"><span>{v.channelIcon}</span><span className="yt-ch-name">{v.channelName}</span></div>
              <div className="yt-title">{v.snippet.title}</div>
              <div className="yt-meta">{timeAgo(v.snippet.publishedAt)}</div>
            </div>
          </a>
        ))}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//   TAB: AI検索
// ════════════════════════════════════════════════════════════
function AiSearchTab({ aiKey }) {
  const [q, setQ] = useState("");
  const [result, setResult] = useState("");
  const [loading, setLoading] = useState(false);
  const [searched, setSearched] = useState("");
  const ref = useRef("");

  const search = async (qq) => {
    const sq = qq || q;
    if (!sq.trim()) return;
    setLoading(true); setResult(""); ref.current = ""; setSearched(sq);
    try {
      const headers = { "Content-Type": "application/json" };
      if (aiKey) {
        headers["x-api-key"] = aiKey;
        headers["anthropic-version"] = "2023-06-01";
        headers["anthropic-dangerous-direct-browser-access"] = "true";
      }
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST", headers,
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514", max_tokens: 1500, stream: true,
          tools: [{ type: "web_search_20250305", name: "web_search" }],
          system: `あなたは「ナガヨシリン fishing club」の釣り情報アシスタントです。
ユーザーの検索クエリに対し、web_searchで最新の釣果情報・SNS投稿・ブログ記事を検索し、以下の形式で日本語で構造的にまとめてください：

【🎣 最新釣果情報】
- 場所・日付・魚種・釣り方を明記したレポート

【📱 SNS・ブログ情報】
- Twitter/X・Instagram・ブログからの最新投稿

【💡 ポイント・タックル情報】
- 効果的なルアー・タックル・ポイント情報

【🔗 参考リンク】
- 関連URL（あれば）

実用的かつ構造的な情報を提供してください。`,
          messages: [{ role: "user", content: sq }],
        }),
      });
      if (!res.ok) throw new Error(`API ${res.status}`);
      const reader = res.body.getReader(); const dec = new TextDecoder(); let buf = "";
      while (true) {
        const { done, value } = await reader.read(); if (done) break;
        buf += dec.decode(value, { stream: true });
        const lines = buf.split("\n"); buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const data = line.slice(6); if (data === "[DONE]") continue;
          try {
            const evt = JSON.parse(data);
            if (evt.type === "content_block_delta" && evt.delta?.type === "text_delta") {
              ref.current += evt.delta.text; setResult(ref.current);
            }
          } catch (_) {}
        }
      }
    } catch (e) { setResult(`エラー: ${e.message}\n\nAnthropic APIキーをダッシュボードで設定してください。`); }
    finally { setLoading(false); }
  };

  return (
    <div>
      <div className="sec-h"><span className="sec-t">🤖 AIリアルタイム釣り情報検索</span><span className="sec-t-sub">SNS・ブログ・ニュース横断</span></div>
      <div style={{ paddingBottom: 14 }}>
        <div className="ai-search-input-row">
          <input className="ai-search-input" placeholder="例: 茨城 鹿島 今日の釣果、メバル釣れてる場所..." value={q} onChange={e => setQ(e.target.value)} onKeyDown={e => e.key === 'Enter' && search()} />
          <button className="btn btn-primary" onClick={() => search()} disabled={loading || !q}>{loading ? '検索中…' : '🔍 検索'}</button>
        </div>
        <div className="ai-presets">
          <span style={{ fontSize: 10, color: 'var(--gray-2)', marginRight: 4 }}>🏷 プリセット:</span>
          {AI_SEARCH_PRESETS.map(p => <button key={p} className="ai-preset" onClick={() => { setQ(p); search(p); }}>{p}</button>)}
        </div>
      </div>
      {(loading || result) && (
        <div className="ai-result">
          <div className="ai-result-h">
            <span>🔍</span><span style={{ fontWeight: 700 }}>「{searched}」</span>
            {loading && <div className="spinner" style={{ width: 14, height: 14, marginLeft: 'auto' }} />}
          </div>
          <div className="ai-result-c">
            {result || <span style={{ color: 'var(--gray-2)' }}>Web検索を実行中...</span>}
            {loading && <span className="ai-typing">▋</span>}
          </div>
        </div>
      )}
      {!loading && !result && (
        <div className="empty">
          <div className="empty-i">🎣</div>
          <div className="empty-t">キーワードを入力してAI検索</div>
          <div className="empty-d">SNS・ブログ・ニュースをClaude AIがリアルタイム横断検索<br/>釣果情報・ポイント・タックル何でもOK</div>
        </div>
      )}
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//   メインアプリ
// ════════════════════════════════════════════════════════════
function NagayoshirinInfoHubV2() {
  const [tab, setTab] = useState("dashboard");
  const [feeds, setFeeds] = useState(() => ls.get(STORAGE_KEYS.FEEDS, DEFAULT_RSS_FEEDS));
  const [channels, setChannels] = useState(() => ls.get(STORAGE_KEYS.CHANNELS, DEFAULT_YT_CHANNELS));
  const [reports, setReports] = useState(() => ls.get(STORAGE_KEYS.REPORTS_CACHE, []));
  const [favorites, setFavorites] = useState(() => ls.get(STORAGE_KEYS.FAVORITES, []));
  const [ytKey, setYtKey] = useState(() => ls.get(STORAGE_KEYS.YT_API, ""));
  const [aiKey, setAiKey] = useState(() => ls.get(STORAGE_KEYS.AI_API, ""));
  const [now, setNow] = useState(new Date());

  // 永続化
  useEffect(() => ls.set(STORAGE_KEYS.FEEDS, feeds), [feeds]);
  useEffect(() => ls.set(STORAGE_KEYS.CHANNELS, channels), [channels]);
  useEffect(() => ls.set(STORAGE_KEYS.REPORTS_CACHE, reports.slice(0, 200)), [reports]);
  useEffect(() => ls.set(STORAGE_KEYS.FAVORITES, favorites), [favorites]);
  useEffect(() => ls.set(STORAGE_KEYS.YT_API, ytKey), [ytKey]);
  useEffect(() => ls.set(STORAGE_KEYS.AI_API, aiKey), [aiKey]);

  // 時刻更新
  useEffect(() => { const t = setInterval(() => setNow(new Date()), 30000); return () => clearInterval(t); }, []);

  const updateReport = (updated) => {
    setReports(prev => prev.map(r => r.id === updated.id ? updated : r));
  };

  const tabs = [
    { id: "dashboard", icon: "📊", label: "ダッシュボード", count: null },
    { id: "reports",   icon: "📋", label: "釣果レポート",     count: reports.length },
    { id: "youtube",   icon: "🎬", label: "YouTube",        count: channels.filter(c => c.active && c.channelId).length },
    { id: "ai",        icon: "🤖", label: "AIリアルタイム検索", count: null },
  ];

  return (
    <>
      <style>{STYLES}</style>
      <div className="app">
        <div className="hdr">
          <div className="hdr-row">
            <div className="brand">
              <div className="brand-1">NAGAYOSHIRIN <span className="ac">INFO HUB</span></div>
              <div className="brand-2">ナガヨシリン FISHING CLUB — REAL-TIME INTELLIGENCE</div>
            </div>
            <div className="live">
              <span className="live-dot" />LIVE {now.getHours().toString().padStart(2,'0')}:{now.getMinutes().toString().padStart(2,'0')}
            </div>
          </div>
        </div>

        <div className="nav">
          {tabs.map(t => (
            <button key={t.id} className={`nav-tab ${tab === t.id ? 'active' : ''}`} onClick={() => setTab(t.id)}>
              <span>{t.icon}</span>{t.label}
              {t.count !== null && <span className="nav-tab-cnt">{t.count}</span>}
            </button>
          ))}
        </div>

        <div className="main">
          <div className="panel">
            {tab === "dashboard" && <DashboardTab reports={reports} onJumpToReports={() => setTab("reports")} />}
            {tab === "reports" && <ReportsTab feeds={feeds} setFeeds={setFeeds} reports={reports} setReports={setReports} favorites={favorites} setFavorites={setFavorites} aiKey={aiKey} setAiKey={setAiKey} onUpdateReport={updateReport} />}
            {tab === "youtube" && <YouTubeTab channels={channels} setChannels={setChannels} ytKey={ytKey} setYtKey={setYtKey} />}
            {tab === "ai" && <AiSearchTab aiKey={aiKey} />}
          </div>
        </div>

        <div style={{ textAlign: 'center', padding: '8px 0 20px', fontSize: 9, color: 'rgba(158,181,205,0.3)', letterSpacing: 1 }}>
          NAGAYOSHIRIN FISHING CLUB © INFO HUB v2 — POWERED BY RSS · YOUTUBE API · CLAUDE AI
        </div>
      </div>
    </>
  );
}
